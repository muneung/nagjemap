<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheerHeart</title>
    <!-- 스타일css -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/map1-table.css">
</head>

<body>
    <div id="titlelogo">PelipperMail</div>

    <div id="content-wrapper">

        <!-- 메뉴 토글 버튼(데스크톱 모드에서는 비활성) -->
        <button id="menu-toggle" class="hidden">&#9776;</button>

        <div id="menu" class="sidebar">
            <p>메뉴 로드 중...</p>
        </div>

        <!-- 소개 영역 -->
        <div id="main">
            <h1>시어하트</h1>

            <div class="map-section">
                <h2>시어하트 제도에 어서 오세요!</h2>
                <a href="./images/sheerheart.png" target="_blank">
                    <img id="sheerheartmapID" src="./images/sheerheart.png" alt="이데아 지도" />
                </a>
                <p>
                    리그에 도전하기 위해 시어하트 제도에서 획득할 수 있는 배지는 4개까지입니다.
                    어디를 여행할지, 어떤 체육관부터 도전할 것인지는 온전히 당신의 선택에 달려 있습니다.<br>
                    행운을 빌어요, 트레이너!
                </p>
            </div>

            <!-- 지도 테이블 -->
            <div class="map-section">
                <div id="map-table-placeholder">
                    <p>맵 테이블 로드 중...</p>
                </div>
                [ ★ ] : 체육관이 있는 장소<br>
                [ ☆ ] : 특별한 포켓몬이 있는/있던 장소<br>
                [ ♬ ] : 프렌들리숍과 식재료 상점이 있는 장소<br>
                [ ♪ ] : 기타 구매 가능 물품이 있는 장소<br>
            </div>
            <!-- 지도 테이블 -->
        </div>
    </div>

    <script src="./js/sidemenu.js"></script>
    <script src="./js/loader.js"></script>
</body>


</html>
