<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractured Moon</title>
    <!-- 스타일css -->
    <link rel="stylesheet" href="./css/style.css">
</head>

<!-- 임시로 일단 프랙처문 자리에 넣어서 테스트 -->

<body>
    <div id="titlelogo">PelipperMail</div>

    <div id="content-wrapper">

        <!-- 메뉴 토글 버튼(데스크톱 모드에서는 비활성) -->
        <button id="menu-toggle" class="hidden">&#9776;</button>

        <div id="menu" class="sidebar">
            <p>메뉴 로드 중...</p>
        </div>

        <!-- 소개 영역 -->
        <div id="main">
            <h2>시어하트 제도</h2>

            <div class="map-info">
                💡 지도를... 어쩌고... 터치... 어쩌고.
            </div>

            <div class="map-section">
                <h3>시어하트 지도</h3>

                <div class="map-section-inner">
                    <div class="map-container" id="mapContainer">
                        <img src="./images/sheerheart.png" alt="시어하트 지도" class="map-image" id="mapImage">
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>

    </div>
    </div>

    <script src="./js/sidemenu.js"></script>
    <script src="./js/loader.js"></script>
    <script>
        // 참조: hotspot 참조 js 단위 필요로(역량부족) 임시로 html에 쌩으로 붙여넣음 - 최적화 필요 //
        function initializeMenu() {
            const menuToggle = document.getElementById('menu-toggle');
            const menu = document.getElementById('menu');

            if (!menu || !menuToggle) return;

            // 메뉴 토글 함수
            function toggleMenu() {
                menu.classList.toggle('visible');
                menu.classList.toggle('hidden');
            }

            // 버튼 클릭 이벤트 리스너 연결
            menuToggle.addEventListener('click', toggleMenu);

            // 화면 크기를 감지하여 메뉴 상태를 설정하는 함수
            function checkViewport() {
                // 모바일 기준 폭 768px
                const isMobile = window.innerWidth <= 768;

                if (isMobile) {
                    // 모바일 상태: 메뉴를 fixed로 고정하고 숨김 상태로 시작하도록 클래스 설정
                    menu.style.position = 'fixed';
                    menu.style.height = '100vh';

                    // 만약 visible 또는 hidden 클래스가 설정되어 있지 않다면 hidden으로 시작
                    if (!menu.classList.contains('visible') && !menu.classList.contains('hidden')) {
                        menu.classList.add('hidden');
                    }
                } else {
                    // 데스크톱 상태: 메뉴를 항상 보이게 함
                    menu.style.transform = 'none';
                    menu.classList.remove('hidden', 'visible');
                    menu.style.position = 'initial';
                    menu.style.height = 'auto';
                }
            }

            // 페이지 로드 시 및 화면 크기 변경 시 함수 실행
            window.addEventListener('load', checkViewport);
            window.addEventListener('resize', checkViewport);

            // load 이벤트 이전에 스크립트가 실행될 경우를 대비해 한 번 즉시 실행
            checkViewport();
        }

        // DOM 콘텐츠가 모두 로드된 후 initializeMenu 함수 실행
        document.addEventListener('DOMContentLoaded', initializeMenu);

        // 난 참조문같은거 안 적는 씹상여자임
        const hotspots = [
            // 왼쪽 지역
            { name: 'centerpin', x: 50, y: 50, url: 'loca_example.html' },
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('mapContainer');
            const mapImage = document.getElementById('mapImage');
            let createdHotspots = [];

            function createHotspotElements() {

                createdHotspots.forEach(h => h.el.remove());
                createdHotspots = [];

                hotspots.forEach(spot => {
                    const el = document.createElement('div');
                    el.className = 'hotspot';

                    el.dataset.x = spot.x;
                    el.dataset.y = spot.y;
                    el.dataset.url = spot.url || '';

                    const label = document.createElement('div');
                    label.className = 'hotspot-label';
                    label.textContent = spot.name || '';
                    el.appendChild(label);

                    el.addEventListener('click', (e) => {
                        const url = el.dataset.url;
                        if (url) window.location.href = url;
                    });

                    container.appendChild(el);
                    createdHotspots.push({ spot, el });
                });
            }

            function positionHotspots() {
                const imgRect = mapImage.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();

                if (imgRect.width === 0 || imgRect.height === 0) return;

                createdHotspots.forEach(item => {
                    const el = item.el;
                    const pctX = parseFloat(el.dataset.x); // 0~100
                    const pctY = parseFloat(el.dataset.y);

                    const px = (pctX / 100) * mapImage.clientWidth;
                    const py = (pctY / 100) * mapImage.clientHeight;

                    el.style.left = px + 'px';
                    el.style.top = py + 'px';

                });
            }

            let resizeTimeout = null;
            function scheduleReposition() {
                if (resizeTimeout) clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(positionHotspots, 50);
            }

            function init() {
                createHotspotElements();
                positionHotspots();
            }

            if (mapImage.complete) {
                init();
            } else {
                mapImage.addEventListener('load', init);
            }

            window.addEventListener('resize', scheduleReposition);
            window.addEventListener('orientationchange', scheduleReposition);
            window.addEventListener('scroll', scheduleReposition);
        });
    </script>
</body>

</html>
